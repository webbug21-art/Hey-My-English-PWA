  <header class="hero">
    <p class="eyebrow">PODCAST SELF-TALK TRAINER</p>
    <h1>Hey, My English</h1>
    <p>생각을 정리하고, 이야기를 만들고, 자연스럽게 말하는 360문장</p>
  </header>
  <main>
    <section class="search-box">
      <label for="searchInput">한국어 상황이나 영어 표현 검색</label>
      <div class="search-row">
        <input id="searchInput" type="search" placeholder="예: 진로가 불안해, 진짜 친구, Here's the thing">
        <button id="searchButton" class="button primary" type="button">검색</button>
      </div>
    </section>
    <nav class="mode-tabs" aria-label="연습 모드">
      <button class="mode active" data-mode="recall" type="button">한국어 리콜</button>
      <button class="mode" data-mode="shadowing" type="button">쉐도잉</button>
    </nav>
    <section class="toolbar">
      <label>주제<select id="topicFilter"><option value="all">전체 주제</option></select></label>
      <label>중요도<select id="importanceFilter"><option value="all">전체</option><option value="5">5 · 최우선</option><option value="4">4 · 높은 활용도</option><option value="3">3 · 유머·리듬</option></select></label>
      <label>에피소드<select id="episodeFilter"><option value="all">전체 에피소드</option></select></label>
    </section>
    <div class="quick-actions">
      <button id="randomButton" class="button secondary" type="button">랜덤</button>
      <button id="reviewButton" class="button secondary" type="button">어려운 문장 <span id="reviewCount">0</span></button>
      <button id="exportButton" class="button secondary" type="button">Anki CSV</button>
    </div>
    <p id="status" class="status">앱을 준비하는 중…</p>
    <section id="practiceArea" aria-label="문장 연습"></section>
    <section id="searchResults" class="results" hidden></section>
  </main>
  <footer>개인 영어 학습용 비공식 앱 · 원문을 그대로 복제하기보다 재사용 가능한 말하기 패턴을 학습합니다.</footer>

  "진로": ["꿈", "미래", "커리어", "일"], "친구": ["우정", "관계", "배신", "경계"],

  "시간": ["버티기", "평가", "판단", "나중", "클래식"], "제약": ["예산", "부족", "연료", "창의력"]
};
function normalise(value = "") { return String(value).toLowerCase().normalize("NFKC").replace(/[^\p{L}\p{N}]+/gu, " ").trim(); }
function termsFor(query) {
  const base = normalise(query).split(/\s+/).filter(Boolean);
  const expanded = new Set(base);
  for (const term of base) for (const [key, values] of Object.entries(SYNONYMS)) {
    if (term.includes(key) || values.some((value) => term.includes(value))) { expanded.add(key); values.forEach((value) => expanded.add(value)); }
  }
  return [...expanded];
}
function searchSentences(query, data) {
  const clean = normalise(query);
  if (!clean) return [];
  const terms = termsFor(query);
  const patternMap = new Map(data.patterns.map((item) => [item.id, item]));
  const topicMap = new Map(data.topics.map((item) => [item.id, item]));
  const episodeMap = new Map((data.episodes || []).map((item) => [String(item.id), item]));
  return data.sentences.map((sentence) => {
    const pattern = patternMap.get(sentence.patternId) || {};
    const topic = topicMap.get(sentence.topicId) || {};
    const episode = episodeMap.get(String(sentence.sourceEpisode)) || {};
    const fields = {
      korean: normalise([sentence.ko, ...(sentence.searchKeywords || [])].join(" ")),
      english: normalise(sentence.en),
      pattern: normalise([pattern.frame, pattern.explanationKo].join(" ")),
      topic: normalise([topic.labelKo, ...(topic.aliases || []), ...(sentence.tags || [])].join(" ")),
      episode: normalise([episode.shortKo, episode.titleKo, episode.titleEn, episode.descriptionKo, ...(episode.aliases || [])].join(" "))
    };
    let score = 0;
    const reasons = [];
    if (fields.korean.includes(clean)) { score += 18; reasons.push("한국어 상황"); }
    if (fields.english.includes(clean)) { score += 16; reasons.push("영어 문장"); }
    if (fields.episode.includes(clean)) { score += 12; reasons.push("에피소드 제목"); }
    for (const term of terms) {
      if (fields.korean.includes(term)) { score += 5; reasons.push("한국어·유사어"); }
      if (fields.pattern.includes(term)) { score += 4; reasons.push("재사용 패턴"); }
      if (fields.topic.includes(term)) { score += 3; reasons.push("주제·태그"); }
      if (fields.episode.includes(term)) { score += 6; reasons.push("에피소드 제목"); }
      if (fields.english.includes(term)) { score += 3; reasons.push("영어 표현"); }
    }
    return { sentence, pattern, topic, episode, score, matchedReason: [...new Set(reasons)].join(" · ") };
  }).filter((item) => item.score > 0).sort((a, b) => b.score - a.score || b.sentence.importance - a.sentence.importance).slice(0, 30);
}


const KEY = "hey-my-english-review-v1";
function read() { try { return JSON.parse(localStorage.getItem(KEY) || "{}"); } catch { return {}; } }
function write(value) { localStorage.setItem(KEY, JSON.stringify(value)); }
function rateSentence(id, rating) {
  const state = read();
  if (rating === "hard") state[id] = { hard: true, interval: 0, dueAt: Date.now() };
  else {
    const previous = state[id] || { interval: 0 };
    const intervals = [1, 3, 7, 14, 30];
    const next = Math.min((previous.interval || 0) + 1, intervals.length - 1);
    state[id] = { hard: false, interval: next, dueAt: Date.now() + intervals[next] * 86400000 };
  }
  write(state);
}
function hardIds(sentences) {
  const state = read();
  return sentences.filter((item) => state[item.id]?.hard || (state[item.id]?.dueAt && state[item.id].dueAt <= Date.now())).map((item) => item.id);
}
function hardCount(sentences) { return hardIds(sentences).length; }



function csv(value) { return '"' + String(value ?? "").replace(/"/g, '""') + '"'; }
function exportAnki(sentences, patterns, episodes = []) {
  const patternMap = new Map(patterns.map((item) => [item.id, item]));
  const episodeMap = new Map(episodes.map((item) => [String(item.id), item]));
  const rows = [["Korean", "English", "Pattern", "Importance", "Listening Point", "Episode", "Episode Title"]];
  for (const item of sentences) {
    const pattern = patternMap.get(item.patternId) || {};
    const episode = episodeMap.get(String(item.sourceEpisode)) || {};
    rows.push([item.ko, item.en, pattern.frame || "", item.importance, item.listeningPointKo, item.sourceEpisode, episode.shortKo || item.sourceThemeKo || ""]);
  }
  const content = "\ufeff" + rows.map((row) => row.map(csv).join(",")).join("\r\n");
  const url = URL.createObjectURL(new Blob([content], { type: "text/csv;charset=utf-8" }));
  const link = document.createElement("a");
  link.href = url;
  link.download = "hey-my-english-360.csv";
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

  if (!items.length) {
    el.practiceArea.innerHTML = '<div class="practice-card">현재 조건에 맞는 문장이 없습니다.</div>';
    el.status.textContent = state.reviewOnly ? "어려운 문장 복습 완료" : "문장 없음";
    return;
  }
  state.index = ((state.index % items.length) + items.length) % items.length;
  const item = items[state.index];
  const pattern = patternFor(item.patternId);
  const topic = topicFor(item.topicId);
  const episode = episodeFor(item.sourceEpisode);
  const episodeName = episode.shortKo || item.sourceThemeKo || ("에피소드 " + item.sourceEpisode);
  const show = state.revealed || state.mode === "shadowing";
  el.status.textContent = (state.reviewOnly ? "어려운 문장 · " : "") + (topic.labelKo || "전체 주제") + " · " + (state.episode === "all" ? "전체 에피소드" : episodeName) + " · " + items.length + "개";
  const answer = [
    '<div class="answer"', show ? "" : " hidden", '>',
    '<p class="answer-label">', state.mode === "shadowing" ? "LISTEN & SHADOW" : "ENGLISH RECALL", '</p>',
    '<p class="english">', escapeHtml(item.en), '</p>',
    '<div class="chunks">', item.shadowingChunks.map((chunk) => '<span class="chunk">' + escapeHtml(chunk) + '</span>').join(""), '</div>',
    '<div class="detail"><strong>REUSABLE PATTERN</strong><p>', escapeHtml(pattern.frame || ""), '</p><p>', escapeHtml(pattern.explanationKo || item.whyLearnKo), '</p></div>',
    '<div class="detail"><strong>LISTENING POINT</strong><p>', escapeHtml(item.listeningPointKo), '</p></div>',
    '<div class="detail"><strong>EPISODE</strong><p>', escapeHtml(episode.titleKo || episodeName), '</p><p>', escapeHtml(episode.descriptionKo || item.sourceThemeKo), '</p></div></div>'
  ].join("");
  el.practiceArea.innerHTML = [
    '<article class="practice-card"><div class="meta">',
    '<span class="badge">', escapeHtml(topic.icon || "•"), ' ', escapeHtml(topic.labelKo || item.topicId), '</span>',
    '<span class="badge importance-', item.importance, '">중요도 ', item.importance, ' · ', escapeHtml(item.importanceLabel), '</span>',
    '<span class="badge">', escapeHtml(episodeName), '</span><span class="counter">', state.index + 1, ' / ', items.length, '</span></div>',
    '<p class="prompt-label">KOREAN THOUGHT</p><h2 class="ko">', escapeHtml(item.ko), '</h2>', answer,
    '<div class="actions"><button class="button reveal" data-action="reveal" type="button">', show && state.mode === "recall" ? "영어 숨기기" : "영어 보기", '</button>',
    '<button class="button hard" data-action="hard" type="button">어려움</button><button class="button good" data-action="good" type="button">알겠음</button>',
    '<button class="button next" data-action="next" type="button">다음 문장</button></div></article>'
  ].join("");
  el.practiceArea.querySelector('[data-action="reveal"]').addEventListener("click", () => { state.revealed = !state.revealed; renderPractice(); });
  el.practiceArea.querySelector('[data-action="hard"]').addEventListener("click", () => { rateSentence(item.id, "hard"); next(); });
  el.practiceArea.querySelector('[data-action="good"]').addEventListener("click", () => { rateSentence(item.id, "good"); next(); });
  el.practiceArea.querySelector('[data-action="next"]').addEventListener("click", next);
}
function next() { state.index += 1; state.revealed = false; updateReviewCount(); renderPractice(); }
function reset() { state.index = 0; state.revealed = false; state.reviewOnly = false; el.searchResults.hidden = true; el.practiceArea.hidden = false; renderPractice(); }
function resultHtml(result) {
  const sentence = result.sentence;
  const episode = result.episode || episodeFor(sentence.sourceEpisode);
  const episodeName = episode.shortKo || sentence.sourceThemeKo || ("에피소드 " + sentence.sourceEpisode);
  return ['<article class="result-card"><div class="meta"><span class="badge">', escapeHtml(result.topic.labelKo || sentence.topicId),
    '</span><span class="badge importance-', sentence.importance, '">중요도 ', sentence.importance, '</span><span class="badge">', escapeHtml(episodeName), '</span></div><h3>', escapeHtml(sentence.ko),
    '</h3><p class="english">', escapeHtml(sentence.en), '</p><div class="detail"><strong>PATTERN</strong><p>', escapeHtml(result.pattern.frame || ""),
    '</p></div><div class="detail"><strong>EPISODE</strong><p>', escapeHtml(episode.titleKo || episodeName), '</p></div><p class="match">찾은 이유: ', escapeHtml(result.matchedReason), '</p></article>'].join("");
}
function runSearch() {
  const query = el.searchInput.value.trim();
  if (!query) { reset(); return; }
  const results = searchSentences(query, state.data);
  el.practiceArea.hidden = true;
  el.searchResults.hidden = false;
  el.status.textContent = results.length ? "관련도 높은 문장 " + results.length + "개" : "검색 결과 없음";
  el.searchResults.innerHTML = '<h2>“' + escapeHtml(query) + '” 검색 결과</h2><div class="result-grid">' + results.map(resultHtml).join("") + '</div>';
}
function bind() {
  el.searchButton.addEventListener("click", runSearch);
  el.searchInput.addEventListener("keydown", (event) => { if (event.key === "Enter") runSearch(); });
  el.topicFilter.addEventListener("change", () => { state.topicId = el.topicFilter.value; reset(); });
  el.importanceFilter.addEventListener("change", () => { state.importance = el.importanceFilter.value; reset(); });
  el.episodeFilter.addEventListener("change", () => { state.episode = el.episodeFilter.value; reset(); });
  el.randomButton.addEventListener("click", () => { const items = currentItems(); state.index = items.length ? Math.floor(Math.random() * items.length) : 0; state.revealed = false; renderPractice(); });
  el.reviewButton.addEventListener("click", () => { state.reviewOnly = !state.reviewOnly; state.index = 0; state.revealed = false; renderPractice(); });
  el.exportButton.addEventListener("click", () => exportAnki(state.data.sentences, state.data.patterns, state.data.episodes));
  document.querySelectorAll("[data-mode]").forEach((button) => button.addEventListener("click", () => {
    state.mode = button.dataset.mode; state.revealed = false;
    document.querySelectorAll("[data-mode]").forEach((item) => item.classList.toggle("active", item === button));
    renderPractice();
  }));
}
function init() {
  ["searchInput", "searchButton", "topicFilter", "importanceFilter", "episodeFilter", "randomButton", "reviewButton", "reviewCount", "exportButton", "status", "practiceArea", "searchResults"].forEach((id) => { el[id] = document.getElementById(id); });
  try {
    for (const topic of state.data.topics) el.topicFilter.insertAdjacentHTML("beforeend", '<option value="' + escapeHtml(topic.id) + '">' + escapeHtml(topic.icon) + " " + escapeHtml(topic.labelKo) + '</option>');
    for (const episode of state.data.episodes) el.episodeFilter.insertAdjacentHTML("beforeend", '<option value="' + escapeHtml(episode.id) + '">' + escapeHtml(episode.shortKo) + '</option>');
    bind(); updateReviewCount(); renderPractice();
  } catch (error) { console.error(error); el.status.textContent = "앱을 시작하지 못했습니다. 생성된 index.html을 열어 주세요."; }
}
init();

</script>
</body>
</html>
